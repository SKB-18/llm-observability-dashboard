name: Tests & Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # =========================================================================
  # Backend Tests & Coverage
  # =========================================================================
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements.txt

      - name: Lint with Black
        continue-on-error: true
        run: |
          black --check backend/ --line-length=120

      - name: Lint with Flake8
        continue-on-error: true
        run: |
          flake8 backend/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Type check with mypy
        continue-on-error: true
        run: |
          mypy backend/ --ignore-missing-imports || true

      - name: Run tests with pytest
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-report=html --cov-report=term-missing
        env:
          DATABASE_URL: sqlite:///./test.db

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella-py${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pytest-results-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  # =========================================================================
  # Frontend Tests & Build
  # =========================================================================
  frontend-tests:
    name: Frontend Tests & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["16", "18", "20"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint with ESLint
        working-directory: frontend
        continue-on-error: true
        run: npm run lint 2>/dev/null || true

      - name: Format check with Prettier
        working-directory: frontend
        continue-on-error: true
        run: |
          npx prettier --check src/ 2>/dev/null || true

      - name: Run tests
        working-directory: frontend
        continue-on-error: true
        run: npm test -- --coverage --passWithNoTests 2>/dev/null || true

      - name: Build for production
        working-directory: frontend
        run: npm run build

      - name: Archive build artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build-node${{ matrix.node-version }}
          path: frontend/dist/
          retention-days: 30

  # =========================================================================
  # Code Quality & Linting
  # =========================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          pip install black flake8 isort mypy

      - name: Check import sorting
        continue-on-error: true
        run: isort --check-only backend/ --profile black

      - name: Check code formatting (Black)
        continue-on-error: true
        run: black --check backend/ --line-length=120

      - name: Lint with Flake8
        continue-on-error: true
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,migrations

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint JavaScript/React
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

  # =========================================================================
  # Docker Build & Image Validation
  # =========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker images
        run: docker-compose build --no-cache

  # =========================================================================
  # Summary Job
  # =========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, code-quality, docker-build]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          echo "✅ All critical tests passed!"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const backends = "${{ needs.backend-tests.result }}";
            const frontend = "${{ needs.frontend-tests.result }}";
            const quality = "${{ needs.code-quality.result }}";
            const docker = "${{ needs.docker-build.result }}";

            const comment = `
## Test Results 🧪

| Category | Status |
|----------|--------|
| Backend Tests | ${backends === 'success' ? '✅ Passed' : '❌ Failed'} |
| Frontend Tests | ${frontend === 'success' ? '✅ Passed' : '❌ Failed'} |
| Code Quality | ${quality === 'success' ? '✅ Passed' : '⚠️ Issues'} |
| Docker Build | ${docker === 'success' ? '✅ Passed' : '❌ Failed'} |

See [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
