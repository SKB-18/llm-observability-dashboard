name: CI

on:
  push:
    branches: [master, "feature/**"]
  pull_request:
    branches: [master]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: lint + test + coverage
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements.txt
          pip install "bcrypt==4.0.1" "email-validator" \
                      "opentelemetry-instrumentation-fastapi" \
                      "responses>=0.24.0" \
                      "nltk>=3.8" "rouge-score>=0.1.2" \
                      "openai>=1.0.0"

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab')"

      - name: Lint (flake8)
        run: |
          flake8 backend/ --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,migrations
        continue-on-error: true

      - name: Run tests + coverage
        run: |
          pytest tests/ -q \
            --cov=backend --cov=sdk \
            --cov-config=.coveragerc \
            --cov-report=xml \
            --cov-report=term-missing
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-32-chars-long!"
          AZURE_OPENAI_API_KEY: "fake"
          AZURE_OPENAI_ENDPOINT: "https://fake.openai.azure.com"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          flags: backend-py${{ matrix.python-version }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # Frontend: build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint (ESLint)
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 50
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Security: dependency audit
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2022-42969
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm dependencies
        working-directory: frontend
        run: npm install && npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Gate: all jobs must pass before merging
  # ─────────────────────────────────────────────────────────────
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "Backend checks failed" && exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "Frontend build failed" && exit 1
          fi
          echo "All checks passed"
